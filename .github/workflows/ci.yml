name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify types and build
        run: npm run verify

      - name: Run smoke checks against built app
        run: |
          USE_IN_MEMORY_STORAGE=true npm run start &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          sleep 10
          npm run smoke

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install brand validation dependencies
        run: python -m pip install --upgrade pip pillow numpy

      - name: Validate brand assets
        run: npm run brand:validate

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
